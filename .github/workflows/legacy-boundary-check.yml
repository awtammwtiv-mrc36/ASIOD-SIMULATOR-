name: Legacy Boundary Check

on:
  pull_request:

jobs:
  legacy-boundary-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files only
        shell: bash
        run: |
          set -euo pipefail

          TOKENS='Flocq|Isabelle|Z3|CVC5|IEEE-754|IEEE 754|binary128|quadruple|__float128|libquadmath'

          git diff --name-only "origin/${{ github.base_ref }}"...HEAD > changed_files.txt || true

          if [ ! -s changed_files.txt ]; then
            echo "No changed files."
            exit 0
          fi

          fail=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            case "$file" in
              legacy_playground/*) continue ;;
              public_results/*) continue ;;
              public_audit.log) continue ;;
              public_audit_entry_templates.json) continue ;;
              apply_disable_pr_template.md) continue ;;
              discover_and_provenance.sh) continue ;;
              create_evidence_archive.sh) continue ;;
              .github/workflows/legacy-boundary-check.yml) continue ;;
            esac

            if grep -nE "$TOKENS" "$file"; then
              echo "Blocked legacy token found outside approved shell: $file"
              fail=1
            fi
          done < changed_files.txt

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

          echo "Legacy boundary check passed."
