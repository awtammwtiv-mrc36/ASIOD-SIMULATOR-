name: Run Legacy Audit Status

on:
  workflow_dispatch:

jobs:
  audit-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run legacy audit status
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "./discover_and_audit_status.sh" ]; then
            echo "discover_and_audit_status.sh is missing from repo root."
            exit 1
          fi

          chmod +x ./discover_and_audit_status.sh
          ./discover_and_audit_status.sh

          echo "----- legacy_audit_status.json -----"
          cat legacy_audit_status.json

      - name: Upload audit result
        uses: actions/upload-artifact@v4
        with:
          name: legacy-audit-status
          path: legacy_audit_status.json
