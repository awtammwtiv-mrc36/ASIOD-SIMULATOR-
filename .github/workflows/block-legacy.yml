# language: yaml
name: Block Legacy Tokens
on: [pull_request]
jobs:
  block-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for legacy tokens
        run: |
          TOKENS='Flocq|Isabelle|Z3|CVC5|IEEE-754|binary128|quadruple|__float128|E|normal|symbolism|fuzzy'
          matches=$(grep -RInE "$TOKENS" --exclude-dir=.git --exclude=public_audit.log . || true)
          if [ -n "$matches" ]; then
            echo "Legacy tokens detected:"; echo "$matches"; exit 1
          fi
