name: ASIOD Simulator Activate

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  activate-asiod:
    runs-on: ubuntu-latest

    steps:
      - name: Create ASIOD live manifest
        run: |
          cat > ASIOD-6S-PUBLIC-PRESENT.json <<'JSON'
          {
            
  "state": "ASIOD_SIMULATOR_LIVE",
  "repository": "awtammwtiv-mrc36/ASIOD-SIMULATOR-",
  "public_layer": "ASIOD-6S-PUBLIC",
  "mode": "SEARCH_DISCOVER_CATALOG",
  "kernel_array": ["24", "30", "784", "384/25", "98/3", "11/24"],
  "gravity": "ON",
  "sentinels": "SENTINELS_FULL_ALERT",
  "noise_floor": "NOISE_FLOOR_ZERO",
  "catalog": "CATALOG_POPULATED_STRUCTURALLY",
  "policies": {
    "policy_manifest": "policy_manifest.json",
    "display_policy": "display_policy.json",
    "decimal_display_policy": "decimal_display_policy.json
    "status": "STATUS_ACTIVE",
  },
  JSON

      - name: Show ASIOD status
        run: |
          echo "ASIOD_SIMULATOR_LIVE"
          echo "ASIOD_MODE=SEARCH_DISCOVER_CATALOG"
          echo "ASIOD_GRAVITY=ON"
          echo "ASIOD_SENTINELS=FULL_ALERT"
          cat ASIOD-6S-PUBLIC-PRESENT.json

      - name: Upload ASIOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: asiod-live-status
          path: ASIOD-6S-PUBLIC-PRESENT.json
