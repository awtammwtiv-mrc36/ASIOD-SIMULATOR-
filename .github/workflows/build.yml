yaml

name: Build LaTeX PDFs
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install TeX Live
        run: sudo apt-get update && sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended
      - name: Build PDFs
        run: |
          mkdir -p pdfs
          for f in proofs/*.tex; do
            fname=$(basename "$f" .tex)
            pdflatex -output-directory=pdfs -interaction=nonstopmode "$f" || true
          done
      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: proofs-pdfs
          path: pdfs/*.pdf
