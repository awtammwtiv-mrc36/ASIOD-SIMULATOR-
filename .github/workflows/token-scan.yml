name: Token Pattern Scan

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Scan for IEEE / binary128 / formalization tokens
        shell: bash
        run: |
          TOKENS='binary128|quadruple|__float128|libquadmath|Flocq|Isabelle|Z3|CVC5|IEEE-754|floating-point|NaN|Infinity'

          grep -RInE "$TOKENS" \
            --exclude-dir=.git \
            --exclude=public_audit.log \
            . > token_scan_results.txt || true

          if [ -s token_scan_results.txt ]; then
            echo "MATCHES_FOUND"
            cat token_scan_results.txt
            exit 1
          else
            echo "NO_MATCHES"
          fi
